<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>WB Smart Control</title>

<style>

body{
font-family:Arial;
background:#f3f3f3;
padding:30px;
}

.container{
background:white;
padding:25px;
border-radius:10px;
width:500px;
margin:auto;
}

h1{
text-align:center;
}

input{
width:100%;
padding:8px;
margin:6px 0;
}

button{
background:#2f3b52;
color:white;
padding:10px;
border:none;
width:100%;
margin-top:10px;
}

.result{
margin-top:15px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>Калькулятор прибыли Wildberries</h1>

<label>Цена закупки</label>
<input type="number" id="buy">

<label>Цена продажи</label>
<input type="number" id="sell">

<label>Комиссия Wildberries (%)</label>
<input type="number" id="commission">

<label>Логистика</label>
<input type="number" id="log">

<label>Налог (%)</label>
<input type="number" id="tax">

<button onclick="calc()">Рассчитать прибыль</button>

<div class="result" id="result"></div>

</div>

<script>

function calc(){

let buy = parseFloat(document.getElementById("buy").value)||0;
let sell = parseFloat(document.getElementById("sell").value)||0;
let commission = parseFloat(document.getElementById("commission").value)||0;
let log = parseFloat(document.getElementById("log").value)||0;
let tax = parseFloat(document.getElementById("tax").value)||0;

let commissionMoney = sell * commission / 100;
let taxMoney = sell * tax / 100;

let profit = sell - buy - commissionMoney - log - taxMoney;

document.getElementById("result").innerHTML =
"Прибыль: " + profit.toFixed(2) + " ₽";

}

</script>

</body>
</html>
